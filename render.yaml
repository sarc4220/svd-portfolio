# ─────────────────────────────────────────────────────────────────────────────
#  SVD Portfolio — Render Static Site Configuration
#  Repo: sarc4220/svd-portfolio
#  Docs: https://render.com/docs/infrastructure-as-code
# ─────────────────────────────────────────────────────────────────────────────

services:
  - type: web
    name: svd-portfolio
    runtime: static
    staticPublishPath: .        # serve from repo root (where index.html lives)
    buildCommand: ""            # pure static — no build step needed
    pullRequestPreviewsEnabled: false

    headers:
      # HTML — never cache so every push deploys instantly
      - path: /index.html
        name: Cache-Control
        value: "public, max-age=0, must-revalidate"

      - path: /
        name: Cache-Control
        value: "public, max-age=0, must-revalidate"

      # Cover images — cache forever (filenames are versioned)
      - path: /image/*
        name: Cache-Control
        value: "public, max-age=31536000, immutable"

      # PDF covers in image/ — serve inline so pdf.js can render them
      - path: /image/*.pdf
        name: Content-Type
        value: "application/pdf"

      - path: /image/*.pdf
        name: Content-Disposition
        value: "inline"

      - path: /image/*.pdf
        name: Cache-Control
        value: "public, max-age=31536000, immutable"

      # Reports (flipbook PDFs) — serve inline
      - path: /reports/*
        name: Content-Type
        value: "application/pdf"

      - path: /reports/*
        name: Content-Disposition
        value: "inline"

      - path: /reports/*
        name: Cache-Control
        value: "public, max-age=86400"

      # Project images — cache for 1 day
      - path: /Projects/*/*
        name: Cache-Control
        value: "public, max-age=86400"

      # Project PDFs — serve inline so viewer can open them
      - path: /Projects/*/*.pdf
        name: Content-Type
        value: "application/pdf"

      - path: /Projects/*/*.pdf
        name: Content-Disposition
        value: "inline"

      - path: /Projects/*/*.pdf
        name: Cache-Control
        value: "public, max-age=86400"

    routes:
      # SPA fallback — any unmatched URL loads index.html
      - type: rewrite
        source: /*
        destination: /index.html
