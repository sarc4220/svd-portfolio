# ─────────────────────────────────────────────
#  SVD Portfolio — Netlify Configuration
# ─────────────────────────────────────────────

[build]
  publish = "."

# ── Cache: cover images ───────────────────────────────────────
[[headers]]
  for = "/image/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── PDF covers in image/ folder ───────────────────────────────
[[headers]]
  for = "/image/*.pdf"
  [headers.values]
    Content-Type = "application/pdf"
    Content-Disposition = "inline"
    Cache-Control = "public, max-age=31536000, immutable"

# ── Reports: serve PDFs inline so flipbook can fetch them ─────
[[headers]]
  for = "/reports/*"
  [headers.values]
    Content-Type = "application/pdf"
    Content-Disposition = "inline"
    Cache-Control = "public, max-age=86400"

# ── Project PDFs ──────────────────────────────────────────────
[[headers]]
  for = "/Projects/*/*.pdf"
  [headers.values]
    Content-Type = "application/pdf"
    Content-Disposition = "inline"
    Cache-Control = "public, max-age=86400"

# ── HTML: never cache so updates deploy instantly ─────────────
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
